project:
  type: website

website:
  title: "discrete_modulus"
  page-navigation: true
  back-to-top-navigation: true

format:
  html:
    theme: cosmo

quartodoc:
  package: discrete_modulus
  dir: reference
  title: "API Reference"
  parser: numpy
  render_interlinks: false
  sections:
    - title: Algorithms
      desc: Core solvers for discrete modulus.
      contents:
        - algorithms
    - title: Families
      desc: >
        Functor classes/operators implementing families of objects
        (`ShortestObjectFinder`s) for use with `algorithms.modulus`.
      contents:
        - name: families.networkx_families
          member_options:
            members: [__init__, __call__]
            include_private: true
        - name: families.family_operators
          member_options:
            members: [__init__, __call__]
            include_private: true
    - title: Demo
      desc: Small graphs and brute-force helpers for demonstrations.
      contents:
        - demo
    - title: Protocols
      desc: Shared result types and structural interfaces.
      contents:
        - protocols.ShortestResult
        - protocols.SubproblemResult
        - protocols.ModulusResult
        - name: protocols.ShortestObjectFinder
          members: [__call__]
          include_private: true
        - name: protocols.SubproblemSolver
          members: [__call__]
          include_private: true
