site_name: discrete_modulus
site_description: API reference for the discrete_modulus Python package
repo_url: https://github.com/nathan-albin/discrete-modulus
repo_name: nathan-albin/discrete-modulus
edit_uri: edit/main/python/docs/

docs_dir: pages
site_dir: _site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            docstring_style: numpy
            show_source: true
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            show_root_heading: true
            filters:
              - "!^_"
              - "^__call__$"

nav:
  - Home: index.md
  - API Reference:
      - Overview: reference/index.md
      - Algorithms: reference/algorithms.md
      - Families:
          - NetworkX families: reference/families/networkx_families.md
          - Family operators: reference/families/family_operators.md
      - Demo: reference/demo.md
      - Protocols: reference/protocols.md
